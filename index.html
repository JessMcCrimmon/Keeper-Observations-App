<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Keeper Observations</title>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background: #f4f4f9; touch-action: manipulation; }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        .container { padding: 15px; }
        
        .storage-meter { font-size: 12px; color: #7f8c8d; text-align: center; margin-bottom: 15px; font-weight: bold; background: #ecf0f1; padding: 8px; border-radius: 6px; }
        
        input[type="text"], input[type="date"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; background: white; }
        button { width: 100%; padding: 15px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .start-btn { background: #3498db; color: white; margin-top: 10px; }
        
        .session-summary { background: #e8f8f5; border: 2px solid #2ecc71; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: bold; color: #2c3e50; text-align: center; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); } }
        @keyframes pulse-orange { 0% { box-shadow: 0 0 0 0 rgba(225, 112, 85, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(225, 112, 85, 0); } 100% { box-shadow: 0 0 0 0 rgba(225, 112, 85, 0); } }

        .cat-btn { background: #34495e; color: white; border: 1px solid #2c3e50; }
        .task-btn { background: #ffffff; color: #333; border: 1px solid #ddd; }
        .back-btn { background: #bdc3c7; color: #333; grid-column: span 2; margin-bottom: 10px; }
        
        .active-zone { margin-bottom: 20px; min-height: 50px; background: #e8f8f5; border: 2px dashed #2ecc71; border-radius: 8px; padding: 10px; }
        .active-zone:empty { display: none; }
        .pinned-task { background: #2ecc71; color: white; animation: pulse-green 1.5s infinite; margin-bottom: 10px; width: 100%; text-align: left; padding: 15px;}
        
        .section-title { font-size: 14px; color: #7f8c8d; text-transform: uppercase; margin-bottom: 10px; font-weight: bold; }
        
        .int-btn { background: #ffeaa7; color: #d35400; }
        .int-btn.active-int { background: #e17055; color: white; animation: pulse-orange 1.5s infinite; }
        
        .undo-btn { background: #95a5a6; color: white; width: 100%; margin-bottom: 20px;}
        
        .note-container { background: #ffffff; border: 2px solid #bdc3c7; border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .note-container textarea { width: 100%; height: 80px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; font-family: inherit; resize: none; box-sizing: border-box; background: #f9f9f9; margin-bottom: 10px; }
        .note-container textarea:focus { outline: none; border-color: #3498db; }
        .log-note-btn { background: #2ecc71; color: white; margin-top: 10px; }
        
        .checkbox-group { margin-bottom: 15px; font-size: 15px; background: #f4f4f9; padding: 10px; border-radius: 6px; border: 1px solid #eee; }
        .checkbox-group label { display: block; margin-bottom: 8px; cursor: pointer; }
        .checkbox-group input[type="checkbox"] { width: auto; margin-right: 10px; transform: scale(1.2); }

        .end-btn { background: #7f8c8d; color: white; margin-top: 10px; margin-bottom: 20px; }
        .clear-btn { background: #bdc3c7; color: #333; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">Keeper Observations</div>

    <div id="setup" class="container" style="display: block;">
        <div id="storage-meter" class="storage-meter">Storage: Calculating...</div>
        
        <label>Team Name</label>
        <input type="text" id="teamName" placeholder="e.g., Primates Team">
        
        <label>Observer ID</label>
        <input type="text" id="observerId" placeholder="Initials or ID">
        
        <button class="start-btn" id="begin-btn">Begin Session</button>
        <button class="clear-btn" id="clear-btn" onclick="requestClear()">Clear Synced Data</button>
    </div>

    <div id="app" class="container" style="display: none;">
        <div id="session-summary" class="session-summary"></div>
        
        <div class="section-title">Currently Running (Tap to Stop)</div>
        <div id="active-zone" class="active-zone"></div>

        <div class="section-title" id="menu-title">Select Category</div>
        <div class="grid" id="menu-grid"></div>

        <div class="section-title">Interruptions (Independent Timer)</div>
        <div class="grid" id="int-grid"></div>

        <div class="section-title">Log a Note</div>
        <div class="note-container">
            <div id="note-targets" class="checkbox-group">
                </div>
            <textarea id="inline-note" placeholder="Tap here to type a note..."></textarea>
            <button class="log-note-btn" onclick="saveInlineNote()">Log Note</button>
        </div>

        <div class="section-title">Session Actions</div>
        <button class="undo-btn" onclick="undoActive()">Undo Last Task</button>
        <button class="end-btn" id="end-btn">End Session</button>
    </div>

    <script>
        // --- ADD YOUR SCRIPT URL HERE ---
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwjHBkzbh--F_MQacQbBJZk6bA9PVL1tpYnZj54yz4McmrC68QlWWpvNZ1fewiUH61l/exec";
        
        const taskHierarchy = {
            "Husbandry": ["Enclosure Cleaning", "Food Prep", "Diet Provision", "Enrichment"],
            "Animal Mgmt": ["Observations", "Training", "Animal Interaction"],
            "Operations": ["Records/Admin", "Human Interaction", "Travel", "Downtime"]
        };
        
        const interruptions = ["Visitor Interaction", "Radio Call", "Equipment Issue", "Other"];

        let session = { id: "", team: "", observer: "" };
        let logs = []; 
        let activeTasks = {}; 
        let activeInterruption = null; 
        
        let clockInterval;
        let endArmed = false;
        let endArmTimer = null;
        let clearStage = 0;
        let clearTimer = null;

        // --- THE AUTO-SAVE ENGINE ---
        function saveState() {
            const vault = { s: session, l: logs, a: activeTasks, i: activeInterruption };
            localStorage.setItem('keeper_app_vault', JSON.stringify(vault));
            updateStorageMeter();
        }

        function checkVault() {
            const saved = localStorage.getItem('keeper_app_vault');
            if (saved) {
                const vault = JSON.parse(saved);
                logs = vault.l || [];
                
                if (vault.s && vault.s.team) {
                    session = vault.s;
                    activeTasks = vault.a || {};
                    activeInterruption = vault.i || null;
                    
                    document.getElementById('session-summary').innerText = `Team: ${session.team}  |  Obs: ${session.observer}`;
                    document.getElementById('setup').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    
                    renderActiveZone();
                    updateNoteTargets();
                    
                    if (activeInterruption) {
                        let btn = document.getElementById('btn-' + activeInterruption.name.replace(/[^a-zA-Z0-9]/g, ''));
                        if (btn) btn.classList.add('active-int');
                    }
                    
                    clockInterval = setInterval(updateClocks, 1000);
                }
            }
            updateStorageMeter();
        }

        // --- STORAGE METER & CLEARING ---
        function updateStorageMeter() {
            let vaultStr = localStorage.getItem('keeper_app_vault') || '[]';
            let bytes = new Blob([vaultStr]).size;
            let percent = ((bytes / 5242880) * 100).toFixed(2); 
            let syncedCount = logs.filter(i => i.synced).length;
            let unsyncedCount = logs.filter(i => !i.synced).length;
            
            document.getElementById('storage-meter').innerHTML = 
                `Storage: ${percent}% of 5MB Limit<br>` + 
                `<span style="font-weight:normal; font-size:11px;">(Cloud: ${syncedCount} rows | Pending: ${unsyncedCount} rows)</span>`;
        }

        function requestClear() {
            let btn = document.getElementById('clear-btn');
            if (clearStage === 0) {
                clearStage = 1;
                btn.innerText = "⚠️ Are you sure? Tap again.";
                btn.style.background = "#e67e22";
                btn.style.color = "white";
                clearTimer = setTimeout(resetClear, 5000);
            } else if (clearStage === 1) {
                clearStage = 2;
                btn.innerText = "🚨 FINAL WARNING: Tap to delete SYNCED data.";
                btn.style.background = "#e74c3c";
                clearTimeout(clearTimer);
                clearTimer = setTimeout(resetClear, 5000);
            } else if (clearStage === 2) {
                executeClear();
            }
        }

        function resetClear() {
            clearStage = 0;
            let btn = document.getElementById('clear-btn');
            btn.innerText = "Clear Synced Data";
            btn.style.background = "#bdc3c7"; 
            btn.style.color = "#333";
        }

        function executeClear() {
            clearTimeout(clearTimer);
            let unsyncedOnly = logs.filter(item => item.synced === false);
            let deletedCount = logs.length - unsyncedOnly.length;
            logs = unsyncedOnly;
            saveState(); 
            resetClear();
            alert(`Cleared ${deletedCount} safely backed-up rows. \n${unsyncedOnly.length} pending rows protected.`);
        }

        // --- GOOGLE SYNC ENGINE ---
        async function syncEngine() {
            let unsynced = logs.filter(item => item.synced === false);
            if(unsynced.length === 0) return; 
            
            for (let item of unsynced) {
                try {
                    let response = await fetch(scriptUrl, {
                        method: 'POST', mode: 'no-cors',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(item)
                    });
                    item.synced = true; 
                } catch (e) {
                    break; 
                }
            }
            saveState(); 
        }

        setInterval(syncEngine, 30000);

        window.onload = () => {
            renderCategories();
            const intGrid = document.getElementById('int-grid');
            interruptions.forEach(int => {
                let btn = document.createElement('button');
                btn.className = 'int-btn';
                btn.id = 'btn-' + int.replace(/[^a-zA-Z0-9]/g, '');
                btn.innerText = int;
                btn.onclick = () => toggleInterruption(int);
                intGrid.appendChild(btn);
            });

            checkVault();
            syncEngine(); 

            const beginBtn = document.getElementById('begin-btn');
            const triggerSession = (e) => {
                if(e) e.preventDefault(); document.activeElement.blur(); startSession();
            };
            beginBtn.addEventListener('touchstart', triggerSession, {passive: false});
            beginBtn.addEventListener('click', triggerSession);

            const endBtn = document.getElementById('end-btn');
            const triggerExport = (e) => {
                if(e) e.preventDefault();
                if (!endArmed) {
                    endArmed = true;
                    endBtn.style.background = '#e74c3c';
                    endBtn.innerText = "⚠️ TAP AGAIN TO CONFIRM END";
                    endArmTimer = setTimeout(() => {
                        endArmed = false;
                        endBtn.style.background = '#7f8c8d';
                        endBtn.innerText = "End Session";
                    }, 5000);
                } else {
                    clearTimeout(endArmTimer);
                    endBtn.style.background = '#7f8c8d';
                    endBtn.innerText = "Closing...";
                    endSession();
                }
            };
            endBtn.addEventListener('touchstart', triggerExport, {passive: false});
            endBtn.addEventListener('click', triggerExport);
        };

        function startSession() {
            if (document.getElementById('app').style.display === 'block') return;
            session.id = new Date().toISOString();
            session.team = document.getElementById('teamName').value || "Unknown";
            session.observer = document.getElementById('observerId').value || "Unknown";
            
            document.getElementById('session-summary').innerText = `Team: ${session.team}  |  Obs: ${session.observer}`;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            
            saveState(); 
            updateNoteTargets();
            clockInterval = setInterval(updateClocks, 1000);
        }

        function renderCategories() {
            const menuGrid = document.getElementById('menu-grid');
            document.getElementById('menu-title').innerText = "Select Category";
            menuGrid.innerHTML = ""; 
            Object.keys(taskHierarchy).forEach(category => {
                let btn = document.createElement('button');
                btn.className = 'cat-btn';
                btn.innerText = category;
                btn.onclick = () => renderSubTasks(category);
                menuGrid.appendChild(btn);
            });
        }

        function renderSubTasks(category) {
            const menuGrid = document.getElementById('menu-grid');
            document.getElementById('menu-title').innerText = `${category} Tasks`;
            menuGrid.innerHTML = ""; 
            let backBtn = document.createElement('button');
            backBtn.className = 'back-btn';
            backBtn.innerText = "← Back to Categories";
            backBtn.onclick = () => renderCategories();
            menuGrid.appendChild(backBtn);

            taskHierarchy[category].forEach(task => {
                let btn = document.createElement('button');
                btn.className = 'task-btn';
                btn.innerText = task;
                if(activeTasks[task]) {
                    btn.style.opacity = '0.5';
                    btn.innerText += " (Running)";
                } else {
                    btn.onclick = () => startTask(task);
                }
                menuGrid.appendChild(btn);
            });
        }

        // Creates dynamic checkboxes based on what is currently running
        function updateNoteTargets() {
            let container = document.getElementById('note-targets');
            container.innerHTML = `<label><input type="checkbox" id="cb-general" value="General" checked> General Session Note</label>`;
            
            const uncheckGeneral = `onchange="document.getElementById('cb-general').checked = false;"`;
            
            Object.keys(activeTasks).forEach(task => {
                container.innerHTML += `<label><input type="checkbox" class="event-cb" data-type="task" data-name="${task}" value="${activeTasks[task].start}" ${uncheckGeneral}> Attach to Task: ${task}</label>`;
            });
            
            if (activeInterruption) {
                container.innerHTML += `<label><input type="checkbox" class="event-cb" data-type="interruption" data-name="${activeInterruption.name}" value="${activeInterruption.start}" ${uncheckGeneral}> Attach to Interruption: ${activeInterruption.name}</label>`;
            }

            // Ensure "General" unchecks other boxes if selected manually
            document.getElementById('cb-general').addEventListener('change', function() {
                if(this.checked) {
                    let boxes = document.querySelectorAll('.event-cb');
                    boxes.forEach(b => b.checked = false);
                }
            });
        }

        function startTask(taskName) {
            if (activeTasks[taskName]) return; 
            if (Object.keys(activeTasks).length >= 2) return alert("Maximum 2 concurrent tasks allowed.");
            
            activeTasks[taskName] = { start: Date.now() };
            
            renderActiveZone();
            updateNoteTargets();
            saveState(); 
            
            let currentTitle = document.getElementById('menu-title').innerText;
            if(currentTitle.includes("Tasks")) renderSubTasks(currentTitle.replace(" Tasks", ""));
        }

        function stopTask(taskName) {
            let now = Date.now();
            let taskData = activeTasks[taskName];
            
            let payload = {
                dataType: "task",
                sessionId: session.id,
                timestamp: new Date().toISOString(),
                team: session.team,
                task: taskName,
                taskStart: new Date(taskData.start).toISOString(),
                taskEnd: new Date(now).toISOString(),
                synced: false
            };
            
            logs.push(payload);
            delete activeTasks[taskName];
            renderActiveZone();
            updateNoteTargets();
            saveState(); 
            syncEngine();
            
            let currentTitle = document.getElementById('menu-title').innerText;
            if(currentTitle.includes("Tasks")) renderSubTasks(currentTitle.replace(" Tasks", ""));
        }

        function renderActiveZone() {
            const zone = document.getElementById('active-zone');
            zone.innerHTML = ""; 
            Object.keys(activeTasks).forEach(task => {
                let btn = document.createElement('button');
                btn.className = 'pinned-task';
                btn.id = 'active-' + task.replace(/[^a-zA-Z0-9]/g, '');
                btn.innerHTML = `<strong>${task}</strong><br><span style="font-size:12px; font-weight:normal;" id="clock-${task.replace(/[^a-zA-Z0-9]/g, '')}">00:00</span>`;
                btn.onclick = () => stopTask(task);
                zone.appendChild(btn);
            });
        }

        function updateClocks() {
            let now = Date.now();
            Object.keys(activeTasks).forEach(task => {
                let duration = Math.floor((now - activeTasks[task].start) / 1000);
                let m = String(Math.floor(duration / 60)).padStart(2, '0');
                let s = String(duration % 60).padStart(2, '0');
                let span = document.getElementById('clock-' + task.replace(/[^a-zA-Z0-9]/g, ''));
                if (span) span.innerText = `${m}:${s}`;
            });

            if (activeInterruption) {
                let duration = Math.floor((now - activeInterruption.start) / 1000);
                let m = String(Math.floor(duration / 60)).padStart(2, '0');
                let s = String(duration % 60).padStart(2, '0');
                let btn = document.getElementById('btn-' + activeInterruption.name.replace(/[^a-zA-Z0-9]/g, ''));
                if (btn) btn.innerText = `${activeInterruption.name} (${m}:${s})`;
            }
        }

        function toggleInterruption(intName) {
            let now = Date.now();
            let btn = document.getElementById('btn-' + intName.replace(/[^a-zA-Z0-9]/g, ''));

            if (activeInterruption) {
                if (activeInterruption.name !== intName) return alert("End the current interruption first.");
                
                let payload = {
                    dataType: "interruption",
                    sessionId: session.id,
                    team: session.team,
                    observer: session.observer,
                    intStart: new Date(activeInterruption.start).toISOString(),
                    intEnd: new Date(now).toISOString(),
                    intType: activeInterruption.name,
                    synced: false
                };
                
                logs.push(payload);
                btn.classList.remove('active-int');
                btn.innerText = intName; 
                activeInterruption = null;
            } else {
                activeInterruption = { name: intName, start: now };
                btn.classList.add('active-int');
            }
            updateNoteTargets();
            saveState();
            syncEngine();
        }

        function undoActive() {
            let keys = Object.keys(activeTasks);
            if (keys.length === 0) return alert("No primary tasks to undo.");
            let latest = keys.reduce((a, b) => activeTasks[a].start > activeTasks[b].start ? a : b);
            delete activeTasks[latest];
            renderActiveZone();
            updateNoteTargets();
            saveState(); 
        }

        function saveInlineNote() {
            let noteInput = document.getElementById('inline-note');
            let note = noteInput.value.trim();
            if (!note) return;

            let noteTime = new Date().toISOString();
            
            // Gather all checked boxes
            let checkedBoxes = document.querySelectorAll('#note-targets input[type="checkbox"]:checked');
            
            let eventNames = [];
            let eventStarts = [];
            let isGeneral = false;

            checkedBoxes.forEach(box => {
                if (box.id === 'cb-general') {
                    isGeneral = true;
                } else {
                    eventNames.push(box.getAttribute('data-name'));
                    eventStarts.push(new Date(parseInt(box.value)).toISOString());
                }
            });

            if (checkedBoxes.length === 0) isGeneral = true; // Safety fallback

            let payload = {
                dataType: "note",
                sessionId: session.id,
                team: session.team,
                observer: session.observer,
                time: noteTime,
                noteText: note,
                associatedEvent: isGeneral ? "" : eventNames.join(" | "),
                associatedStart: isGeneral ? "" : eventStarts.join(" | "),
                synced: false
            };
            
            logs.push(payload);
            noteInput.value = "";
            noteInput.placeholder = "✅ Note saved!";
            setTimeout(() => { noteInput.placeholder = "Tap here to type a note..."; }, 3000);
            
            // Reset checkboxes
            let allBoxes = document.querySelectorAll('#note-targets input[type="checkbox"]');
            allBoxes.forEach(b => b.checked = false);
            document.getElementById('cb-general').checked = true;

            document.activeElement.blur(); 
            saveState(); 
            syncEngine(); 
        }

        function endSession() {
            clearInterval(clockInterval);

            if (activeInterruption) toggleInterruption(activeInterruption.name);
            Object.keys(activeTasks).forEach(t => stopTask(t)); 

            activeTasks = {};
            activeInterruption = null;
            session = { id: "", team: "", observer: "" };
            
            saveState();
            endArmed = false;

            document.getElementById('end-btn').innerText = "End Session";
            document.getElementById('app').style.display = 'none';
            document.getElementById('setup').style.display = 'block';
            
            syncEngine();
            alert("Session complete. Data is safely stored and syncing.");
        }
    </script>
</body>
</html>
