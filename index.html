<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Keeper Observations</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 0; background: #f4f4f9; touch-action: manipulation; }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        .container { padding: 15px; }
        .storage-meter { font-size: 12px; color: #7f8c8d; text-align: right; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .start-btn { background: #3498db; color: white; margin-top: 10px; }
        .session-summary { background: #e8f8f5; border: 2px solid #2ecc71; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: bold; color: #2c3e50; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .cat-btn { background: #34495e; color: white; }
        .task-btn { background: #ffffff; color: #333; border: 1px solid #ddd; }
        .back-btn { background: #bdc3c7; color: #333; grid-column: span 2; }
        .active-zone { margin-bottom: 20px; background: #e8f8f5; border: 2px dashed #2ecc71; border-radius: 8px; padding: 10px; min-height: 50px; }
        .pinned-task { background: #2ecc71; color: white; margin-bottom: 10px; width: 100%; }
        .section-title { font-size: 14px; color: #7f8c8d; text-transform: uppercase; margin: 15px 0 10px 0; font-weight: bold; }
        .int-btn { background: #ffeaa7; color: #d35400; }
        .int-btn.active-int { background: #e17055; color: white; }
        .note-container { background: #ffffff; border: 2px solid #bdc3c7; border-radius: 8px; padding: 10px; }
        .log-note-btn { background: #2ecc71; color: white; margin-top: 10px; }
        .locked { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header">Keeper Observations</div>
    <div id="storage-meter" class="container storage-meter">Storage: 0%</div>

    <div id="setup" class="container">
        <label>Team Name</label><input type="text" id="teamName">
        <label>Observer ID</label><input type="text" id="observerId">
        <label>Date</label><input type="date" id="obsDate">
        <button class="start-btn" onclick="startSession()">Begin Session</button>
    </div>

    <div id="app" class="container" style="display: none;">
        <div id="session-summary" class="session-summary"></div>
        <div class="section-title">Running Tasks</div>
        <div id="active-zone" class="active-zone"></div>
        <div class="section-title" id="menu-title">Select Category</div>
        <div class="grid" id="menu-grid"></div>
        <div class="section-title">Interruptions</div>
        <div class="grid" id="int-grid"></div>
        <div class="section-title">Quick Note</div>
        <div class="note-container">
            <textarea id="inline-note" style="width:100%; height:60px; border:none;"></textarea>
            <button class="log-note-btn" onclick="saveInlineNote()">Log Note</button>
        </div>
    </div>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycbwjHBkzbh--F_MQacQbBJZk6bA9PVL1tpYnZj54yz4McmrC68QlWWpvNZ1fewiUH61l/exec";
        const taskHierarchy = { "Husbandry": ["Enclosure Cleaning", "Food Prep", "Diet Provision", "Enrichment"], "Animal Mgmt": ["Observations", "Training", "Animal Interaction"], "Operations": ["Records/Admin", "Human Interaction", "Travel", "Downtime"] };
        const interruptions = ["Visitor Interaction", "Radio Call", "Equipment Issue", "Other"];
        
        let session = { team: "", observer: "", date: "" };
        let activeTasks = {};
        let activeInterruption = null;

        // 1. Sync Logic
        async function syncToCloud(logItem) {
            try { await fetch(scriptUrl, { method: 'POST', mode: 'no-cors', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(logItem) }); return true; } 
            catch (e) { return false; }
        }

        // 2. Local Vault
        function saveToVault(logItem) {
            let vault = JSON.parse(localStorage.getItem('keeper_app_vault') || '[]');
            vault.push(logItem);
            localStorage.setItem('keeper_app_vault', JSON.stringify(vault));
            document.getElementById('storage-meter').innerText = `Storage: ${Math.round((JSON.stringify(vault).length / 5242880) * 100)}%`;
            syncToCloud(logItem);
        }

        function logEvent(task, startMs, endMs, interrupted, concurrent, note) {
            saveToVault({
                timestamp: new Date().toISOString(), teamName: session.team, observerId: session.observer, date: session.date,
                task: task, startTime: new Date(startMs).toISOString(), endTime: new Date(endMs).toISOString(),
                duration: ((endMs - startMs) / 1000).toFixed(1), interrupted: interrupted, concurrent: concurrent, notes: note
            });
        }

        function startSession() {
            session.team = document.getElementById('teamName').value;
            session.observer = document.getElementById('observerId').value;
            session.date = document.getElementById('obsDate').value;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('session-summary').innerText = `Team: ${session.team} | Obs: ${session.observer}`;
            renderCategories();
            renderInterruptions();
        }

        function renderCategories() {
            const menuGrid = document.getElementById('menu-grid');
            menuGrid.innerHTML = "";
            Object.keys(taskHierarchy).forEach(cat => {
                let btn = document.createElement('button'); btn.className = 'cat-btn'; btn.innerText = cat;
                btn.onclick = () => renderSubTasks(cat); menuGrid.appendChild(btn);
            });
        }

        function renderSubTasks(cat) {
            const menuGrid = document.getElementById('menu-grid');
            menuGrid.innerHTML = `<button class="back-btn" onclick="renderCategories()">← Back</button>`;
            taskHierarchy[cat].forEach(t => {
                let btn = document.createElement('button'); btn.className = 'task-btn'; btn.innerText = t;
                btn.onclick = () => { activeTasks[t] = Date.now(); renderActiveZone(); renderSubTasks(cat); };
                menuGrid.appendChild(btn);
            });
        }

        function renderActiveZone() {
            const zone = document.getElementById('active-zone');
            zone.innerHTML = "";
            Object.keys(activeTasks).forEach(t => {
                let btn = document.createElement('button'); btn.className = 'pinned-task'; btn.innerText = t;
                btn.onclick = () => { logEvent(t, activeTasks[t], Date.now(), 'N', "", ""); delete activeTasks[t]; renderActiveZone(); };
                zone.appendChild(btn);
            });
        }

        function renderInterruptions() {
            const intGrid = document.getElementById('int-grid');
            interruptions.forEach(int => {
                let btn = document.createElement('button'); btn.className = 'int-btn'; btn.innerText = int;
                btn.onclick = () => { logEvent(int, Date.now(), Date.now(), 'Y', "", "Interruption"); };
                intGrid.appendChild(btn);
            });
        }

        function saveInlineNote() {
            let note = document.getElementById('inline-note').value;
            if (note) { logEvent("Note", Date.now(), Date.now(), 'N', "", note); document.getElementById('inline-note').value = ""; }
        }
    </script>
</body>
</html>
